<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Text Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}
body{
    background:#0f172a;
    color:#fff;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
h1{
    text-align:center;
    margin-bottom:20px;
    font-size:32px;
}
.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}
textarea{
    width:100%;
    background:#1e293b;
    color:#fff;
    border:none;
    outline:none;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    resize:none;
    min-height:120px;
}

.results{
    margin-top:25px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

.text{
    flex:1;
    word-break:break-word;
    font-size:20px;
}

button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    transition:.25s;
}
button:hover{
    background:#2563eb;
}

.styleName{
    width:120px;
    color:#94a3b8;
    font-size:14px;
}

@media(max-width:700px){
.card{
flex-direction:column;
align-items:flex-start;
}
.styleName{
width:auto;
}
button{
width:100%;
}
.text{
font-size:18px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>✨ Fancy Text Generator</h1>
<p class="subtitle">Type anything below and copy stylish Unicode fonts instantly.</p>

<textarea id="input" placeholder="Type your text here...">Hello World</textarea>

<div class="results" id="results"></div>

</div>

<script>

const fonts = [

targetLower:"abcdefghijklmnopqrstuvwxyz",
targetNumber:"0123456789"
},

{
name:"Bold",

lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"𝗔𝗕𝗖𝗗𝗘𝗙𝗚𝗛𝗜𝗝𝗞𝗟𝗠𝗡𝗢𝗣𝗤𝗥𝗦𝗧𝗨𝗩𝗪𝗫𝗬𝗭",
targetLower:"𝗮𝗯𝗰𝗱𝗲𝗳𝗴𝗵𝗶𝗷𝗸𝗹𝗺𝗻𝗼𝗽𝗾𝗿𝘀𝘁𝘂𝘃𝘄𝘅𝘆𝘇",
targetNumber:"𝟬𝟭𝟮𝟯𝟰𝟱𝟲𝟳𝟴𝟵"
},

{
name:"Italic",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"𝘈𝘉𝘊𝘋𝘌𝘍𝘎𝘏𝘐𝘑𝘒𝘓𝘔𝘕𝘖𝘗𝘘𝘙𝘚𝘛𝘜𝘝𝘞𝘟𝘠𝘡",
targetLower:"𝘢𝘣𝘤𝘥𝘦𝘧𝘨𝘩𝘪𝘫𝘬𝘭𝘮𝘯𝘰𝘱𝘲𝘳𝘴𝘵𝘶𝘷𝘸𝘹𝘺𝘻",
targetNumber:"0123456789"
},

{
name:"Bold Italic",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"𝘼𝘽𝘾𝘿𝙀𝙁𝙂𝙃𝙄𝙅𝙆𝙇𝙈𝙉𝙊𝙋𝙌𝙍𝙎𝙏𝙐𝙑𝙒𝙓𝙔𝙕",
targetLower:"𝙖𝙗𝙘𝙙𝙚𝙛𝙜𝙝𝙞𝙟𝙠𝙡𝙢𝙣𝙤𝙥𝙦𝙧𝙨𝙩𝙪𝙫𝙬𝙭𝙮𝙯",
targetNumber:"0123456789"
},

{
name:"Monospace",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"𝙰𝙱𝙲𝙳𝙴𝙵𝙶𝙷𝙸𝙹𝙺𝙻𝙼𝙽𝙾𝙿𝚀𝚁𝚂𝚃𝚄𝚅𝚆𝚇𝚈𝚉",
targetLower:"𝚊𝚋𝚌𝚍𝚎𝚏𝚐𝚑𝚒𝚓𝚔𝚕𝚖𝚗𝚘𝚙𝚚𝚛𝚜𝚝𝚞𝚟𝚠𝚡𝚢𝚣",
targetNumber:"𝟶𝟷𝟸𝟹𝟺𝟻𝟼𝟽𝟾𝟿"
},

{
name:"Double",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ",
targetLower:"𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫",
targetNumber:"𝟘𝟙𝟚𝟛𝟜𝟝𝟞𝟟𝟠𝟡"
},

{
name:"Fraktur",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",

targetUpper:"𝔄𝔅ℭ𝔇𝔈𝔉𝔊ℌℑ𝔍𝔎𝔏𝔐𝔑𝔒𝔓𝔔ℜ𝔖𝔗𝔘𝔙𝔚𝔛𝔜ℨ",
targetLower:"𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷",
targetNumber:"0123456789"
},

{
name:"Bold Fraktur",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"𝕬𝕭𝕮𝕯𝕰𝕱𝕲𝕳𝕴𝕵𝕶𝕷𝕸𝕹𝕺𝕻𝕼𝕽𝕾𝕿𝖀𝖁𝖂𝖃𝖄𝖅",
targetLower:"𝖆𝖇𝖈𝖉𝖊𝖋𝖌𝖍𝖎𝖏𝖐𝖑𝖒𝖓𝖔𝖕𝖖𝖗𝖘𝖙𝖚𝖛𝖜𝖝𝖞𝖟",
targetNumber:"0123456789"
},

{
name:"Circled",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏ",
targetLower:"ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ",
targetNumber:"⓪①②③④⑤⑥⑦⑧⑨"
},

{
name:"Squared",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉",
targetLower:"abcdefghijklmnopqrstuvwxyz",
targetNumber:"0123456789"
},

{
name:"Tiny",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"ᴬᴮᶜᴰᴱᶠᴳᴴᴵᴶᴷᴸᴹᴺᴼᴾQᴿˢᵀᵁⱽᵂˣʸᶻ",
targetLower:"ᵃᵇᶜᵈᵉᶠᵍʰᶦʲᵏˡᵐⁿᵒᵖ۹ʳˢᵗᵘᵛʷˣʸᶻ",
targetNumber:"⁰¹²³⁴⁵⁶⁷⁸⁹"
},

{
name:"Bubble",
upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
lower:"abcdefghijklmnopqrstuvwxyz",
number:"0123456789",
targetUpper:"🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩",
targetLower:"🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩",
targetNumber:"⓿❶❷❸❹❺❻❼❽❾"
},

{
name:"Strikethrough",
custom:true,
func:t=>t.split('').join('̶')
},

{
name:"Underline",
custom:true,
func:t=>t.split('').join('̲')
},

{
name:"Spacing",
custom:true,
func:t=>t.split('').join(' ')
},

{
name:"Reverse",
custom:true,
func:t=>[...t].reverse().join('')
}

];

function convert(text,font){

if(font.custom) return font.func(text);

let result="";

for(let ch of text){

let i=font.upper.indexOf(ch);
if(i!=-1){
result+=font.targetUpper[i]||ch;
continue;
}

i=font.lower.indexOf(ch);
if(i!=-1){
result+=font.targetLower[i]||ch;
continue;
}

i=font.number.indexOf(ch);
if(i!=-1){
result+=font.targetNumber[i]||ch;
continue;
}

result+=ch;

}

return result;

}

function render(){

const value=document.getElementById("input").value;

const results=document.getElementById("results");

results.innerHTML="";

fonts.forEach(font=>{

const output=convert(value,font);

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="styleName">${font.name}</div>
<div class="text">${output}</div>
<button>Copy</button>
`;

div.querySelector("button").onclick=()=>{
navigator.clipboard.writeText(output);
div.querySelector("button").innerText="Copied ✓";
setTimeout(()=>{
div.querySelector("button").innerText="Copy";
},1200);
};

results.appendChild(div);

});

}

document.getElementById("input").addEventListener("input",render);

render();

</script>

</body>
</html>
