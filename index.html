      { name: "34. Crown Royalty", transform: (t) => `👑 ${t} 👑` },
      { name: "35. Dark Skull", transform: (t) => `☠️ ${t} ☠️` },
      { name: "36. Angel Wings", transform: (t) => `꧁༺ ${t} ༻꧂` },
      { name: "37. Diamond Gem", transform: (t) => `💎 ${t} 💎` },
      { name: "38. Lightning Power", transform: (t) => `⚡ ${t} ⚡` },
      { name: "39. Music Notes", transform: (t) => `🎵 ${t} 🎶` },
      { name: "40. Flower Blossom", transform: (t) => `🌸 ${t} 🌸` },
      { name: "41. Ribbon Gift", transform: (t) => `🎗️ ${t} 🎗️` },

      { name: "52. Loading Style", transform: (t) => `[████████] ${t}` }
    ];

    function generateFonts() {
      const text = input.value;
      output.innerHTML = '';

      styles.forEach((style) => {
        const card = document.createElement('div');
        card.className = 'card';

        const convertedText = style.transform(text || "Hello World");

        card.innerHTML = `
          <div class="styleName">${style.name}</div>
          <div class="textContainer">${convertedText}</div>
          <button onclick="copyText('${convertedText.replace(/'/g, "\\'").replace(/\n/g, '')}', this)">Copy</button>
        `;

        output.appendChild(card);
      });
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text);
      btn.innerText = "Copied!";
      setTimeout(() => {
        btn.innerText = "Copy";
      }, 1500);
    }

    generateFonts();
  </script>
