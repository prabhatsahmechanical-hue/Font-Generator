}

    color:white;

    padding:10px 18px;

}

    width:120px;
    color:#94a3b8;
    font-size:14px;
}

.card{

    targetLower:"рқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”§рқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·",

    targetUpper:"рқ•¬рқ•ӯрқ•®рқ•Ҝрқ•°рқ•ұрқ•Ірқ•ірқ•ҙрқ•өрқ•¶рқ•·рқ•ёрқ•№рқ•әрқ•»рқ•јрқ•Ҫрқ•ҫрқ•ҝрқ–Җрқ–Ғрқ–Ӯрқ–ғрқ–„рқ–…",

  },
  {
    name:"Spacing",
    custom:true,

  {
    name:"Reverse",
    custom:true,
    func:t=>[...t].reverse().join('')
  }

function convert(text, font) {
  if (font.custom) return font.func(text);

  const tUpper = Array.from(font.targetUpper);
  const tLower = Array.from(font.targetLower);
  const tNumber = Array.from(font.targetNumber);

  let result = "";

  for (let ch of text) {
    let i = font.upper.indexOf(ch);
    if (i !== -1) {
      result += tUpper[i] || ch;
      continue;
    }

    i = font.lower.indexOf(ch);
    if (i !== -1) {
      result += tLower[i] || ch;
      continue;
    }

    i = font.number.indexOf(ch);
    if (i !== -1) {
      result += tNumber[i] || ch;
      continue;
    }

    result += ch;
  }

  return result;
}

function render() {
  const value = document.getElementById("input").value;
  const results = document.getElementById("results");
  results.innerHTML = "";

  fonts.forEach(font => {
    const output = convert(value, font);
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="styleName">${font.name}</div>
      <div class="text">${output}</div>
      <button>Copy</button>
    `;

    div.querySelector("button").onclick = () => {
      navigator.clipboard.writeText(output);
      div.querySelector("button").innerText = "Copied вң“";
      setTimeout(() => {
        div.querySelector("button").innerText = "Copy";
      }, 1200);
    };

    results.appendChild(div);
  });
}

document.getElementById("input").addEventListener("input", render);
render();
