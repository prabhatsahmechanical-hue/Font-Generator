<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>Fancy Text Generator | Cool Stylish Font Copy & Paste</title>
    <meta name="description" content="Generate cool stylish fancy text fonts for Instagram bio, WhatsApp, Facebook, and games. Copy and paste stylish fonts easily!">
    <meta name="keywords" content="fancy text generator, font generator, stylish fonts, instagram bio font, copy paste fonts">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Social Media Links) -->
    <meta property="og:title" content="Fancy Text Generator - Stylish Fonts for Bio">
    <meta property="og:description" content="Create cool fancy fonts and copy paste them anywhere instantly!">
</head>

<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }
  body { background:#0f172a; color:#fff; padding:20px; }
  .container { max-width:600px; margin:auto; text-align:center; margin-bottom:20px; }
  .font-size32px { font-size:32px; }
  textarea { width:100%; background:#1e293b; color:#fff; border:none; outline:none; padding:15px; border-radius:8px; font-size:16px; header:none; min-height:120px; }
  .result { margin-top:25px; }
  .card { background:#1e293b; border-radius:12px; padding:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:15px; flex-wrap:wrap; }
  .card:hover { flex:1; word-break:break-word; font-size:20px; }
  button { background:#3b82f6; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; transition:.2s; }
  button:hover { background:#2563eb; }
  .styleName { width:120px; color:#94a3b8; font-size:14px; }
  .textContainer { flex:1; text-align:left; }
  .card { flex-direction:column; align-items:flex-start; }
  .styleName { width:auto; }
  button { width:100%; }
  .card { font-size:16px; }
</style>

<body>
  <div class="container">
    <h1 class="font-size32px">Fancy Text Generator</h1>
    <p style="color: #94a3b8; margin-top: 5px; margin-bottom: 20px;">Type anything below and copy stylish unicode fonts instantly.</p>
    <textarea id="userInput" placeholder="Type or paste text here..." oninput="generateFonts()"></textarea>
    <div class="result" id="output"></div>
  </div>

  <script>
    const input = document.getElementById('userInput');
    const output = document.getElementById('output');

    const styles = [
      { name: "Normal", transform: (t) => t },
      { name: "Bold", transform: (text) => convert(text, 0x1D400, 0x1D41A, 0x1D7CE) },
      { name: "Italic", transform: (text) => convert(text, 0x1D434, 0x1D44E) },
      { name: "Bold Italic", transform: (text) => convert(text, 0x1D468, 0x1D482) },
      { name: "Monospace", transform: (text) => convert(text, 0x1D670, 0x1D68A, 0x1D7F6) },
      { name: "Double Struck", transform: (text) => convert(text, 0x1D538, 0x1D552, 0x1D7D8) },
      { name: "Fraktur", transform: (text) => convert(text, 0x1D504, 0x1D51E) }
    ];

    function convert(text, upperStart, lowerStart, numberStart) {
      return Array.from(text).map(char => {
        const code = char.charCodeAt(0);
        if (code >= 65 && code <= 90) return String.fromCodePoint(upperStart + (code - 65));
        if (code >= 97 && code <= 122) return String.fromCodePoint(lowerStart + (code - 97));
        if (numberStart && code >= 48 && code <= 57) return String.fromCodePoint(numberStart + (code - 48));
        return char;
      }).join('');
    }

    function generateFonts() {
      const text = input.value;
      output.innerHTML = '';

      styles.forEach((style, index) => {
        const card = document.createElement('div');
        card.className = 'card';

        const convertedText = style.transform(text || "Hello World");

        card.innerHTML = `
          <div class="styleName">${style.name}</div>
          <div class="textContainer">${convertedText}</div>
          <button onclick="copyText('${convertedText.replace(/'/g, "\\'")}', this)">Copy</button>
        `;

        output.appendChild(card);
      });
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text);
      btn.innerText = "Copied!";
      setTimeout(() => {
        btn.innerText = "Copy";
      }, 1500);
    }

    generateFonts();
  </script>
</body>
</html>
